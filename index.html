<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gorio — Juego Libre</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#5E44B9;--purple-light:#CFC5FF;--yellow:#FFCD00;
  --orange:#FF5F2F;--green:#00A27B;--dark:#09213C;
  --surface:#162235;--surface2:#0d1b2e;
  --teal:#45DBEF;--pink:#FC5479;--font:'Nunito',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--dark);color:white;display:flex;flex-direction:column;height:100vh;}
.header{height:58px;background:var(--purple);padding:0 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-bottom:3px solid var(--yellow);flex-shrink:0;}
@media(max-width:768px){.header{padding:0 14px;height:52px;}}
.header-left{display:flex;align-items:baseline;gap:8px;}
.hora-time{font-size:30px;font-weight:900;color:var(--yellow);letter-spacing:-0.5px;font-variant-numeric:tabular-nums;line-height:1;}
@media(max-width:768px){.hora-time{font-size:20px;}}
.hora-ampm{font-size:14px;font-weight:800;color:rgba(255,205,0,0.75);letter-spacing:1px;}
.header-center{display:flex;justify-content:center;align-items:center;}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:28px;}
@media(max-width:768px){.header-right{gap:14px;}}
.stat-block{display:flex;flex-direction:column;align-items:flex-end;}
.stat-number{font-size:30px;font-weight:900;line-height:1;}
@media(max-width:768px){.stat-number{font-size:20px;}}
.stat-number.green{color:#4ade80;}
.stat-number.orange{color:var(--orange);}
.stat-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.6px;margin-top:1px;}
@media(max-width:768px){.stat-label{font-size:9px;letter-spacing:0.3px;}}
.btn-hoy{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:4px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:background 0.15s,border-color 0.15s;}
.btn-hoy:hover{background:rgba(255,255,255,0.2);border-color:var(--yellow);}
.btn-hoy-num{font-size:20px;font-weight:900;color:white;line-height:1;}
.btn-hoy-label{font-size:9px;font-weight:800;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.6px;margin-top:1px;}
@media(max-width:768px){.btn-hoy-num{font-size:16px;}.btn-hoy{padding:3px 8px;}}
.hoy-modal{background:var(--surface);border-radius:16px;padding:22px;width:300px;border:2px solid var(--purple);animation:su 0.2s ease;}
.hoy-titulo{font-size:16px;font-weight:900;color:white;margin-bottom:4px;}
.hoy-fecha{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;}
.hoy-stat{background:rgba(255,255,255,0.06);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.hoy-stat-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);}
.hoy-stat-val{font-size:22px;font-weight:900;color:var(--yellow);}
.hoy-stat-val.blanco{color:white;}
.hoy-desglose{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.hoy-desglose-titulo{font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.hoy-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;}
.hoy-row:last-child{border-bottom:none;}
.hoy-row-label{color:rgba(255,255,255,0.6);font-weight:600;}
.hoy-row-val{color:var(--yellow);font-weight:800;}
.toolbar{height:46px;background:var(--surface2);padding:0 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);}
@media(max-width:768px){.toolbar{height:auto;padding:8px 12px;flex-wrap:wrap;gap:6px;}}
.tbtn{height:34px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--font);color:rgba(255,255,255,0.65);font-size:12px;font-weight:700;padding:0 14px;gap:6px;white-space:nowrap;transition:border-color 0.15s,color 0.15s;flex-shrink:0;}
.tbtn:hover{border-color:var(--yellow);color:var(--yellow);}
.tbtn svg{width:15px;height:15px;flex-shrink:0;}
.tbtn.sq{width:34px;padding:0;}
.input-group{flex:1;max-width:520px;height:34px;display:flex;align-items:center;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.14);border-radius:8px;overflow:hidden;transition:border-color 0.15s;}
@media(max-width:768px){.input-group{max-width:100%;width:100%;flex:none;}}
.input-group:focus-within{border-color:var(--yellow);}
.input-nombre{flex:1;background:transparent;border:none;padding:0 14px;height:100%;font-family:var(--font);font-size:14px;font-weight:600;color:white;outline:none;}
.input-nombre::placeholder{color:rgba(255,255,255,0.3);}
.input-sep{width:1px;height:20px;background:rgba(255,255,255,0.12);flex-shrink:0;}
.tiempo-selector{display:flex;align-items:center;gap:3px;padding:0 6px;flex-shrink:0;}
.tsel-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.12);border-radius:6px;color:rgba(255,255,255,0.4);font-family:var(--font);font-size:10px;font-weight:800;cursor:pointer;padding:3px 7px;transition:all 0.15s;white-space:nowrap;height:24px;line-height:1;}
.tsel-btn:hover{border-color:rgba(255,205,0,0.5);color:rgba(255,205,0,0.8);}
.tsel-btn.activo{background:rgba(255,205,0,0.15);border-color:var(--yellow);color:var(--yellow);}
.tsel-btn.activo-alerta{background:rgba(255,95,47,0.15);border-color:var(--orange);color:var(--orange);}
@media(max-width:768px){.tiempo-selector{gap:2px;padding:0 4px;}.tsel-btn{font-size:9px;padding:2px 5px;}}
.btn-plus{width:38px;height:34px;background:var(--yellow);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--dark);font-size:24px;font-weight:900;transition:background 0.15s;}
.btn-plus:hover{background:#e6b800;}
.btn-plus:active{transform:scale(0.96);}
.tarifa-bar{height:26px;background:#0a1828;padding:0 20px;display:flex;gap:8px;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04);}
@media(max-width:768px){.tarifa-bar{height:auto;padding:6px 12px;flex-wrap:wrap;gap:4px;}}
.t-sep{font-size:10px;color:rgba(255,255,255,0.2);}
.tbadge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800;}
.t1{background:rgba(255,205,0,0.1);color:rgba(255,205,0,0.6);}
.t2{background:rgba(255,205,0,0.15);color:rgba(255,205,0,0.72);}
.t3{background:rgba(255,205,0,0.2);color:rgba(255,205,0,0.84);}
.t4{background:rgba(255,205,0,0.27);color:rgba(255,205,0,0.92);}
.t5{background:rgba(255,205,0,0.34);color:#FFCD00;}
.cards-area{flex:1;padding:10px 14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:minmax(0,1fr);gap:9px;overflow:hidden;}
@media(max-width:768px){
  .cards-area{grid-template-columns:1fr;grid-auto-rows:auto;overflow-y:auto;padding:8px 12px;gap:8px;}
}
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0.25;gap:10px;}
.empty-icon{width:52px;height:52px;border-radius:50%;border:3px dashed rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,0.4);}
.empty-text{font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);}
.card{background:var(--surface);border-radius:12px;border:2px solid rgba(255,255,255,0.07);display:flex;flex-direction:row;overflow:hidden;position:relative;animation:cardIn 0.2s ease;min-height:0;}
@keyframes cardIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
.card.alerta{border-color:var(--orange);background:#1c1108;}
.card-left{background:rgba(0,0,0,0.22);width:120px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;gap:3px;border-right:1px solid rgba(255,255,255,0.06);}
@media(max-width:768px){.card-left{width:100px;}}
.card-num{font-size:10px;font-weight:800;color:rgba(255,255,255,0.25);letter-spacing:1px;}
.card-tiempo{font-size:28px;font-weight:900;color:var(--yellow);letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap;}
@media(max-width:768px){.card-tiempo{font-size:22px;}}
.card.alerta .card-tiempo{color:var(--orange);}
.card-desde{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);white-space:nowrap;}
.card-desde span{color:rgba(255,255,255,0.55);font-weight:700;}
.card-right{flex:1;min-width:0;display:flex;flex-direction:column;padding:8px 12px;gap:5px;justify-content:space-between;}
.card-nombre{font-size:22px;font-weight:900;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1;flex-shrink:0;}
@media(max-width:768px){.card-nombre{font-size:18px;}}
.card-chips{display:flex;flex-wrap:wrap;gap:3px;min-height:0;flex:1;align-content:flex-start;}
.chip{background:rgba(69,219,239,0.12);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--teal);white-space:nowrap;}
.card-actions{display:flex;gap:5px;flex-shrink:0;}
.cbtn{flex:1;border:none;border-radius:6px;padding:6px 0;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;}
@media(max-width:768px){.cbtn{padding:9px 0;font-size:12px;}}
.cbtn:active{transform:scale(0.96);}
.cbtn-pausar{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);}
.cbtn-pausar.pausado{background:var(--green);color:white;}
.cbtn-notas{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);}
.cbtn-notas.con-nota{background:rgba(255,205,0,0.18);color:var(--yellow);}
.cbtn-consumo{background:rgba(69,219,239,0.14);color:var(--teal);}
.cbtn-salida{background:var(--purple);color:white;}
.badge{position:absolute;top:7px;right:7px;font-size:9px;font-weight:800;border-radius:4px;padding:2px 5px;}
.badge-alerta{background:var(--orange);color:white;}
.badge-pausado{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fi 0.15s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:18px;padding:24px;width:100%;max-width:380px;border:2px solid var(--purple);max-height:92vh;overflow-y:auto;animation:su 0.2s ease;}
.modal.wide{max-width:min(95vw,1100px);width:min(95vw,1100px);padding:28px;}
@media(max-width:768px){.modal.wide{max-width:100%;width:100%;padding:16px;border-radius:14px;}}
@media(max-width:768px){.modal{max-width:100%;width:100%;padding:16px;border-radius:14px;}}
@keyframes su{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mt{font-size:20px;font-weight:900;color:white;}
.mx{background:rgba(255,255,255,0.1);border:none;border-radius:7px;color:rgba(255,255,255,0.6);font-size:12px;font-weight:800;cursor:pointer;padding:5px 10px;font-family:var(--font);}
.mn{font-size:22px;font-weight:900;color:var(--yellow);margin-bottom:12px;}
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);}
.mk{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;}
.mv{font-size:13px;font-weight:800;color:white;}
.mct{font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;}
.mcr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;}
.mcn{color:rgba(255,255,255,0.7);font-weight:600;}
.mcp{color:var(--teal);font-weight:800;}
.cdel{background:none;border:none;color:rgba(252,84,121,0.6);font-size:12px;cursor:pointer;padding:0 3px;font-family:var(--font);font-weight:800;}
.mac{background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.12);border-radius:9px;padding:10px;margin:8px 0;}
.mal{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.mar{display:flex;gap:6px;flex-wrap:wrap;}
.mi{flex:2;min-width:90px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:7px;padding:7px 9px;font-family:var(--font);font-size:12px;font-weight:600;color:white;outline:none;}
.mi:focus{border-color:var(--teal);}
.mi::placeholder{color:rgba(255,255,255,0.3);}
.mi.sm{flex:1;min-width:70px;}
.bai{background:var(--teal);color:var(--dark);border:none;border-radius:7px;padding:7px 12px;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;}
.mto{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-top:12px;}
.mtr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.mtl{font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);}
.mtv{font-size:12px;font-weight:800;color:rgba(255,255,255,0.8);}
.mtr.fin{border-top:1px solid rgba(255,255,255,0.12);margin-top:7px;padding-top:9px;}
.mtr.fin .mtl{font-size:14px;font-weight:900;color:white;}
.mtr.fin .mtv{font-size:20px;font-weight:900;color:var(--yellow);}
.mbp{margin-top:12px;width:100%;background:var(--yellow);color:var(--dark);border:none;border-radius:9px;padding:11px 0;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;}
.mbp:active{transform:scale(0.97);}
.mbs{margin-top:7px;width:100%;background:transparent;color:rgba(255,255,255,0.5);border:1.5px solid rgba(255,255,255,0.15);border-radius:9px;padding:9px 0;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}
.mbd{margin-top:7px;width:100%;background:transparent;color:var(--pink);border:1.5px solid rgba(252,84,121,0.35);border-radius:9px;padding:9px 0;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}
.mbd2{width:100%;background:transparent;color:var(--pink);border:1.5px solid rgba(252,84,121,0.35);border-radius:9px;padding:9px 0;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:12px 0;}
.hres{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
@media(max-width:768px){.hres{gap:6px;}.hs{min-width:calc(50% - 6px);padding:10px 12px;}.hsv{font-size:16px;}}
.hs{flex:1;min-width:100px;background:rgba(255,255,255,0.06);border-radius:9px;padding:14px 18px;}
.hsl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.hsv{font-size:22px;font-weight:900;color:var(--yellow);}
.htw{max-height:min(50vh,480px);overflow-y:auto;border-radius:9px;border:1px solid rgba(255,255,255,0.08);}
@media(max-width:768px){.htw{overflow-x:auto;max-height:40vh;}.ht{min-width:600px;}}
.ht{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.ht th{background:rgba(255,255,255,0.07);padding:9px 10px;text-align:left;font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;}
.ht td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-weight:600;color:rgba(255,255,255,0.8);word-break:break-word;}
.ht tr:last-child td{border-bottom:none;}
.ht td.am{font-weight:800;color:var(--yellow);}
.ht td.te{font-weight:700;color:var(--teal);font-size:10px;}
.he2{padding:24px;text-align:center;font-size:12px;color:rgba(255,255,255,0.3);font-weight:700;}
.hfiltros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.hfbtn{height:34px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.14);border-radius:8px;padding:0 16px;font-family:var(--font);font-size:12px;font-weight:800;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.hfbtn.activo{background:rgba(255,205,0,0.12);border-color:var(--yellow);color:var(--yellow);}
.hdate{height:30px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:7px;padding:0 10px;font-family:var(--font);font-size:12px;font-weight:600;color:white;outline:none;}
.hdate:focus{border-color:var(--yellow);}
.hdate-wrap{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);}
.hdel-row{display:flex;align-items:center;justify-content:center;width:20px;}
.hdel-btn{background:none;border:none;color:rgba(252,84,121,0.5);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:900;padding:0 3px;transition:color 0.15s;}
.hdel-btn:hover{color:var(--pink);}
.catg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;max-height:220px;overflow-y:auto;}
.cit{background:rgba(255,255,255,0.06);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.cin{font-size:12px;font-weight:700;color:white;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cip{font-size:11px;font-weight:800;color:var(--teal);}
.cdl{background:none;border:none;color:rgba(252,84,121,0.6);font-size:13px;cursor:pointer;padding:0 3px;font-family:var(--font);font-weight:900;}
.ce{font-size:12px;color:rgba(255,255,255,0.3);font-weight:700;text-align:center;padding:18px 0;}
.ps{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;max-height:180px;overflow-y:auto;}
.pb{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;cursor:pointer;text-align:left;font-family:var(--font);transition:border-color 0.15s;display:flex;align-items:center;justify-content:space-between;}
.pb:hover{border-color:var(--teal);background:rgba(69,219,239,0.08);}
.pbn{font-size:12px;font-weight:700;color:white;}
.pbp{font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);margin-left:8px;}
.mpago-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px;}
@media(max-width:768px){.mpago-grid{grid-template-columns:1fr 1fr;gap:6px;}}
.mpago-btn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:9px;padding:10px 8px;font-family:var(--font);font-size:12px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.15s;text-align:center;}
.mpago-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.mpago-btn.selected{border-color:var(--yellow);background:rgba(255,205,0,0.12);color:var(--yellow);}
.am-modal{background:var(--surface);border-radius:14px;padding:18px;width:260px;border:2px solid var(--orange);animation:su 0.2s ease;}
.am-title{font-size:14px;font-weight:900;color:white;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.am-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.am-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);}
.atog{position:relative;width:40px;height:22px;cursor:pointer;}
.atog input{display:none;}
.atrack{position:absolute;inset:0;background:rgba(255,255,255,0.15);border-radius:11px;transition:background 0.2s;}
.atog input:checked+.atrack{background:var(--orange);}
.athumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:transform 0.2s;}
.atog input:checked~.athumb{transform:translateX(18px);}
.am-minrow{display:flex;align-items:center;gap:8px;}
.am-minlabel{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);}
.am-mininput{width:56px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:7px;padding:5px 7px;font-family:var(--font);font-size:13px;font-weight:700;color:white;text-align:center;outline:none;}
.am-ok{margin-top:12px;width:100%;background:var(--orange);color:white;border:none;border-radius:7px;padding:9px 0;font-family:var(--font);font-size:12px;font-weight:800;cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(22,34,53,0.97);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;color:white;z-index:2000;animation:fi 0.2s ease;pointer-events:none;}
.login-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:9000;flex-direction:column;gap:0;}
.login-box{background:var(--surface);border-radius:20px;padding:36px 32px;width:100%;max-width:360px;border:2px solid var(--purple);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-titulo{font-size:32px;font-weight:900;color:var(--yellow);letter-spacing:-0.5px;}
.login-sub{font-size:13px;font-weight:700;color:var(--purple-light);margin-top:4px;}
.login-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:14px;display:block;}
.login-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:15px;font-weight:600;color:white;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:var(--yellow);}
.login-input::placeholder{color:rgba(255,255,255,0.25);}
.login-btn{margin-top:22px;width:100%;background:var(--yellow);color:var(--dark);border:none;border-radius:10px;padding:13px 0;font-family:var(--font);font-size:15px;font-weight:900;cursor:pointer;transition:background 0.15s;}
.login-btn:hover{background:#e6b800;}
.login-btn:active{transform:scale(0.97);}
.login-error{margin-top:12px;font-size:12px;font-weight:700;color:var(--pink);text-align:center;min-height:18px;}
</style>
</head>
<body>

<script>
const SUPABASE_URL = 'https://kppbjfmayzwlbmpyizhk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwcGJqZm1heXp3bGJtcHlpemhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzkzMDUsImV4cCI6MjA5MDMxNTMwNX0.-79MPXrcU9jotI3BqIInA9vQcjZtmKDxBj2XI8uTFSo';

const sbHeaders = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

const sb = {
  from: (table) => ({
    _table: table,
    _filters: [],
    _order: null,
    select: function(cols='*') { this._cols = cols; return this; },
    order: function(col, opts={}) { this._order = `${col}.${opts.ascending===false?'desc':'asc'}`; return this; },
    eq: function(col, val) { this._filters.push(`${col}=eq.${val}`); return this; },
    gte: function(col, val) { this._filters.push(`${col}=gte.${val}`); return this; },
    lte: function(col, val) { this._filters.push(`${col}=lte.${val}`); return this; },
    insert: function(data) {
      const t = this._table;
      return {
        select: () => ({ single: () => _sbInsert(t, data) }),
        then: (fn) => _sbInsert(t, data).then(fn)
      };
    },
    update: function(data) {
      const filters = this._filters.slice();
      return {
        eq: (col, val) => { filters.push(`${col}=eq.${val}`); return _sbUpdate(this._table, data, filters); }
      };
    },
    delete: function() {
      const filters = this._filters.slice();
      return {
        eq: (col, val) => _sbDelete(this._table, [...filters, `${col}=eq.${val}`])
      };
    },
    then: function(fn) {
      let url = `${SUPABASE_URL}/rest/v1/${this._table}?select=${this._cols||'*'}`;
      this._filters.forEach(f => url += '&' + f);
      if(this._order) url += '&order=' + this._order;
      return fetch(url, { headers: sbHeaders })
        .then(r => r.json().then(data => ({ data: Array.isArray(data)?data:[], error: r.ok?null:data })))
        .then(fn);
    }
  })
};

async function calcularSegundosReales(entradaMs, segundosGuardados, pausado) {
  // Si esta pausado: usamos los segundos en el momento que se pauso
  if(pausado) return parseInt(segundosGuardados) || 0;
  // Si no esta pausado: SIEMPRE calculamos desde la hora real de entrada
  // Esto garantiza que cualquier dispositivo que abra la pagina vea el tiempo correcto
  if(!entradaMs || isNaN(entradaMs)) return 0;
  const transcurrido = Math.floor((Date.now() - entradaMs) / 1000);
  return Math.max(0, transcurrido);
}

function enAlerta(nino) {
  return nino.tiempoLimite > 0 && !nino.pausado && nino.segundos >= nino.tiempoLimite * 60;
}

function buildCard(nino) {
  const alerta = enAlerta(nino);
  const badge = nino.pausado ? '<div class="badge badge-pausado">PAUSADO</div>' : alerta ? '<div class="badge badge-alerta">ALERTA</div>' : '';
  const chips = nino.consumos.length > 0 ? `<div class="card-chips">${nino.consumos.map(c=>`<span class="chip">${c.nombre}</span>`).join('')}</div>` : '<div class="card-chips"></div>';

  let barraHTML = '';
  if(nino.tiempoLimite > 0) {
    const pct = Math.min(100, Math.round((nino.segundos / (nino.tiempoLimite * 60)) * 100));
    const color = pct >= 100 ? 'var(--orange)' : pct >= 80 ? '#FFCD00' : '#4ade80';
    barraHTML = `<div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:4px;overflow:hidden;">
      <div id="barra-${nino.id}" style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width 1s linear;"></div>
    </div>
    <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.35);margin-bottom:3px;" id="tlabel-${nino.id}">${pct >= 100 ? 'Tiempo cumplido' : `${nino.tiempoLimite} min contratados`}</div>`;
  }

  return `${badge}
    <div class="card-left">
      <div class="card-num">#${ph(nino.numero)}</div>
      <div class="card-tiempo" id="t-${nino.id}">${ft(nino.segundos)}</div>
      <div class="card-desde">desde <span>${fh(nino.entrada)}</span></div>
    </div>
    <div class="card-right">
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="card-nombre">${nino.nombre}</div>
        <button class="cbtn-editar" data-id="${nino.id}" title="Editar" style="background:none;border:none;cursor:pointer;padding:2px;opacity:0.4;transition:opacity 0.15s;flex-shrink:0;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      ${barraHTML}
      <div class="card-nota" style="font-size:10px;font-weight:700;color:var(--yellow);background:rgba(255,205,0,0.1);border-radius:5px;padding:3px 7px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;${nino.nota?'':'display:none;'}">${nino.nota||''}</div>
      ${chips}
      <div class="card-actions">
        <button class="cbtn cbtn-notas ${nino.nota?'con-nota':''}">${nino.nota?'Nota *':'Notas'}</button>
        <button class="cbtn cbtn-consumo">+ Consumo</button>
        <button class="cbtn cbtn-salida">Salida</button>
      </div>
    </div>`;
}

function showEditarNino(nino) {
  const o = mkOv();
  // Formatear hora actual de entrada para el input datetime-local
  const entradaDate = new Date(nino.entrada);
  const pad = n => String(n).padStart(2,'0');
  const entradaLocal = `${entradaDate.getFullYear()}-${pad(entradaDate.getMonth()+1)}-${pad(entradaDate.getDate())}T${pad(entradaDate.getHours())}:${pad(entradaDate.getMinutes())}`;

  o.innerHTML = `<div class="modal">
    <div class="mh"><div class="mt">Editar registro</div><button class="mx" id="ed-x">cerrar</button></div>
    <div class="mal" style="margin-bottom:6px;">Nombre</div>
    <input class="mi" id="ed-nombre" value="${nino.nombre}" maxlength="30" style="width:100%;margin-bottom:14px;font-size:15px;"/>
    <div class="mal" style="margin-bottom:6px;">Hora de entrada</div>
    <input class="mi" id="ed-entrada" type="datetime-local" value="${entradaLocal}" style="width:100%;margin-bottom:6px;font-size:14px;"/>
    <div style="font-size:11px;color:rgba(255,255,255,0.35);font-weight:600;margin-bottom:16px;">El cronometro se recalcula automaticamente desde la hora que ingreses.</div>
    <button class="mbp" id="ed-guardar">Guardar cambios</button>
    <button class="mbs" id="ed-cancelar">Cancelar</button>
  </div>`;
  document.body.appendChild(o);

  o.querySelector('#ed-x').onclick = () => o.remove();
  o.querySelector('#ed-cancelar').onclick = () => o.remove();
  o.onclick = e => { if(e.target === o) o.remove(); };

  o.querySelector('#ed-guardar').onclick = async () => {
    const nuevoNombre = o.querySelector('#ed-nombre').value.trim();
    const nuevaEntradaStr = o.querySelector('#ed-entrada').value;
    if(!nuevoNombre) { toast('El nombre no puede estar vacio'); return; }
    if(!nuevaEntradaStr) { toast('La hora de entrada no puede estar vacia'); return; }

    const nuevaEntradaMs = new Date(nuevaEntradaStr).getTime();
    if(isNaN(nuevaEntradaMs)) { toast('Hora de entrada invalida'); return; }
    if(nuevaEntradaMs > Date.now()) { toast('La hora de entrada no puede ser en el futuro'); return; }

    const btn = o.querySelector('#ed-guardar');
    btn.textContent = 'Guardando...';
    btn.disabled = true;

    try {
      const nuevaEntradaISO = new Date(nuevaEntradaStr).toISOString();
      const r = await fetch(`${SUPABASE_URL}/rest/v1/ninos_activos?id=eq.${nino.id}`, {
        method: 'PATCH',
        headers: sbHeaders,
        body: JSON.stringify({ nombre: nuevoNombre, entrada: nuevaEntradaISO })
      });
      if(!r.ok) throw await r.json();

      // Actualizar en memoria
      nino.nombre = nuevoNombre;
      nino.entrada = nuevaEntradaMs;
      nino.segundos = Math.max(0, Math.floor((Date.now() - nuevaEntradaMs) / 1000));

      setOnline(true);
      o.remove();
      renderCards();
      toast('Registro actualizado');
    } catch(e) {
      setOnline(false);
      toast('Error al guardar. Intenta de nuevo.');
      btn.textContent = 'Guardar cambios';
      btn.disabled = false;
    }
  };
}

function showNotas(nino) {
  const o = mkOv();
  o.innerHTML = `<div class="modal">
    <div class="mh"><div class="mt">Notas — ${nino.nombre}</div><button class="mx" id="nt-x">cerrar</button></div>
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:10px;">Visible para todos los turnos. Se guarda al presionar Guardar.</div>
    <textarea id="nt-texto" style="width:100%;height:110px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px;font-family:var(--font);font-size:13px;color:white;outline:none;resize:none;line-height:1.5;" placeholder="Escribe una nota para el turno...">${nino.nota || ''}</textarea>
    <button class="mbp" id="nt-guardar" style="margin-top:12px;">Guardar nota</button>
    <button class="mbs" id="nt-cancelar">Cancelar</button>
  </div>`;
  document.body.appendChild(o);

  o.querySelector('#nt-x').onclick = () => o.remove();
  o.querySelector('#nt-cancelar').onclick = () => o.remove();
  o.onclick = e => { if(e.target === o) o.remove(); };

  o.querySelector('#nt-guardar').onclick = async () => {
    const texto = o.querySelector('#nt-texto').value.trim();
    const btn = o.querySelector('#nt-guardar');
    btn.textContent = 'Guardando...';
    btn.disabled = true;
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/ninos_activos?id=eq.${nino.id}`, {
        method: 'PATCH', headers: sbHeaders,
        body: JSON.stringify({ nota: texto })
      });
      if(!r.ok) throw await r.json();
      nino.nota = texto;
      setOnline(true);
      o.remove();
      // Actualizar nota visible en la tarjeta sin re-renderizar todo
      const card = document.querySelector(`.card[data-id="${nino.id}"]`);
      if(card) {
        let notaEl = card.querySelector('.nota-visible');
        if(texto) {
          if(notaEl) {
            notaEl.textContent = texto;
          } else {
            notaEl = document.createElement('div');
            notaEl.className = 'nota-visible';
            notaEl.style.cssText = 'font-size:10px;font-weight:700;color:var(--yellow);background:rgba(255,205,0,0.1);border-radius:5px;padding:3px 7px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;';
            notaEl.textContent = texto;
            const chips = card.querySelector('.card-chips');
            if(chips) chips.parentNode.insertBefore(notaEl, chips);
          }
          const btnNotas = card.querySelector('.cbtn-notas');
          if(btnNotas) { btnNotas.textContent = 'Nota *'; btnNotas.className = 'cbtn cbtn-notas con-nota'; }
        } else {
          if(notaEl) notaEl.remove();
          const btnNotas = card.querySelector('.cbtn-notas');
          if(btnNotas) { btnNotas.textContent = 'Notas'; btnNotas.className = 'cbtn cbtn-notas'; }
        }
      }
      // Si el popup de salida esta abierto, actualizar la nota ahi tambien
      const notaSalidaEl = document.querySelector('#s-nota-display');
      if(notaSalidaEl) {
        if(texto) {
          notaSalidaEl.style.display = '';
          notaSalidaEl.textContent = 'Nota: ' + texto;
        } else {
          notaSalidaEl.style.display = 'none';
        }
      }
      toast(texto ? 'Nota guardada' : 'Nota eliminada');
    } catch(e) {
      setOnline(false);
      toast('Error al guardar');
      btn.textContent = 'Guardar nota';
      btn.disabled = false;
    }
  };
}

function attachCardListeners(c, nino) {
  c.querySelector('.cbtn-notas').addEventListener('click',()=>showNotas(nino));
  c.querySelector('.cbtn-salida').addEventListener('click',()=>showSalida(nino));
  c.querySelector('.cbtn-consumo').addEventListener('click',()=>showConsumo(nino.id));
  c.querySelector('.cbtn-editar').addEventListener('click',()=>showEditarNino(nino));
}

function renderCards() {
  const area = $('cards-area');
  const ids = new Set(S.ninos.map(n=>n.id));
  area.querySelectorAll('.card').forEach(c=>{if(!ids.has(parseInt(c.dataset.id)))c.remove();});
  const exist = new Set([...area.querySelectorAll('.card')].map(c=>parseInt(c.dataset.id)));
  if(S.ninos.length===0 && !area.querySelector('.empty-state')){
    area.innerHTML='<div class="empty-state"><div class="empty-icon">+</div><div class="empty-text">Registra la entrada de un nino para comenzar</div></div>';
    return;
  }
  if(S.ninos.length>0){const es=area.querySelector('.empty-state');if(es)es.remove();}
  S.ninos.forEach(nino=>{
    if(!exist.has(nino.id)){
      const c=document.createElement('div');
      c.className='card'; c.dataset.id=nino.id;
      c.innerHTML=buildCard(nino);
      area.appendChild(c);
      attachCardListeners(c, nino);
    } else {
      // Actualizar nota y chips en tarjeta existente sin destruir el cronometro
      const c = area.querySelector(`.card[data-id="${nino.id}"]`);
      if(c) {
        const notaEl = c.querySelector('.card-nota');
        const notaTexto = nino.nota || '';
        if(notaEl) {
          if(notaTexto) { notaEl.textContent = notaTexto; notaEl.style.display = ''; }
          else notaEl.style.display = 'none';
        }
        const btnNotas = c.querySelector('.cbtn-notas');
        if(btnNotas) btnNotas.className = 'cbtn cbtn-notas' + (notaTexto ? ' con-nota' : '');
        if(btnNotas) btnNotas.textContent = notaTexto ? 'Nota *' : 'Notas';
      }
    }
  });
}

// --- CARGAR NINOS ACTIVOS DESDE SUPABASE ---
async function cargarNinos() {
  try {
    const sesion = getSession();
    const sedeFilter = sesion && sesion.sedeId ? `&sede_id=eq.${sesion.sedeId}` : '';
    const r2 = await fetch(`${SUPABASE_URL}/rest/v1/ninos_activos?select=*&order=created_at.asc${sedeFilter}`, {headers: sbHeaders});
    const data = await r2.json();
    const error = r2.ok ? null : data;
    if(error) throw error;

    const idsEnDB = new Set(data.map(r => r.id));
    const idsEnMemoria = new Set(S.ninos.map(n => n.id));

    // Eliminar ninos que ya no estan en DB (marcaron salida desde otro dispositivo)
    S.ninos = S.ninos.filter(n => idsEnDB.has(n.id));

    // Agregar o actualizar
    data.forEach(r => {
      const existente = S.ninos.find(n => n.id === r.id);
      if(existente) {
        // Ya existe en memoria — actualizar consumos, pausado y entrada (por si acaso)
        existente.consumos = r.consumos || [];
        existente.pausado = r.pausado;
        existente.tiempoLimite = r.tiempo_limite || 0;
        existente.nota = r.nota || '';
        // Asegurar que la entrada este bien guardada en memoria
        if(r.entrada && !existente.entrada) {
          const raw = r.entrada.replace(' ','T');
          existente.entrada = Date.parse(raw) || Date.now();
        }
      } else {
        // Nino nuevo desde otro dispositivo — calculamos segundos desde entrada
        const entradaRaw = (r.entrada || r.created_at || '').replace(' ', 'T');
        const entradaMs = entradaRaw ? Date.parse(entradaRaw) : Date.now();
        S.ninos.push({
          id: r.id,
          numero: r.numero,
          nombre: r.nombre,
          entrada: entradaMs,
          segundos: calcularSegundosReales(entradaMs, r.segundos, r.pausado),
          pausado: r.pausado,
          consumos: r.consumos || [],
          tiempoLimite: r.tiempo_limite || 0,
          nota: r.nota || ''
        });
      }
    });

    setOnline(true);
    renderCards();
    updateStats();
  } catch(e) {
    setOnline(false);
    console.error('cargarNinos:', e);
  }
}

async function fetchResumenHoy() {
  try {
    const offsetMs = 5 * 60 * 60 * 1000;
    const hoy = new Date();
    const fechaStr = hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');
    const desde = new Date(new Date(fechaStr+'T00:00:00').getTime() + offsetMs).toISOString();
    const hasta = new Date(new Date(fechaStr+'T23:59:59').getTime() + offsetMs).toISOString();
    const sesionHoy = getSession();
    const sedeFilterHoy = sesionHoy && sesionHoy.sedeId ? `&sede_id=eq.${sesionHoy.sedeId}` : '';
    const url = `${SUPABASE_URL}/rest/v1/historial?select=total_final,precio_juego,total_consumos,descuento,metodo_pago&entrada=gte.${desde}&entrada=lte.${hasta}${sedeFilterHoy}`;
    const r = await fetch(url, { headers: sbHeaders });
    const data = await r.json();
    if(!r.ok) throw data;
    return Array.isArray(data) ? data : [];
  } catch(e) {
    console.error('fetchResumenHoy:', e);
    return [];
  }
}

async function confirmarSalida(nino, totalFinal, descuento, metodoPago, segundosEfectivos) {
  const salida = new Date().toISOString();
  const pF = cp(segundosEfectivos);
  const tC = nino.consumos.reduce((a,c)=>a+c.precio,0);
  try {
    const sesion = getSession();
    const {error: eIns} = await sb.from('historial').insert({
      nombre: nino.nombre,
      entrada: fiso(nino.entrada),
      salida,
      duracion_segundos: segundosEfectivos,
      precio_juego: pF,
      consumos: nino.consumos,
      total_consumos: tC,
      descuento,
      total_final: totalFinal,
      metodo_pago: metodoPago,
      sede_id: sesion ? sesion.sedeId : null,
      nota: nino.nota || ''
    });
    if(eIns) throw eIns;
    const {error: eDel} = await sb.from('ninos_activos').delete().eq('id',nino.id);
    if(eDel) throw eDel;
    S.ninos = S.ninos.filter(n=>n.id!==nino.id);
    setOnline(true);
    renderCards(); updateStats(); actualizarContadorHoy();
  } catch(e) {
    setOnline(false);
    toast('Error al registrar salida. Intenta de nuevo.');
    console.error('confirmarSalida:', e);
    throw e;
  }
}

// --- HISTORIAL DESDE SUPABASE ---
async function fetchHistorial(filtro) {
  try {
    // Colombia es UTC-5, ajustamos para que el filtro sea correcto
    const offsetMs = 5 * 60 * 60 * 1000;
    function toUTC(fechaStr, hora) {
      const local = new Date(fechaStr + 'T' + hora);
      return new Date(local.getTime() + offsetMs).toISOString();
    }

    const sesionHist = getSession();
    const sedeFilterHist = sesionHist && sesionHist.sedeId ? `&sede_id=eq.${sesionHist.sedeId}` : '';
    let url = `${SUPABASE_URL}/rest/v1/historial?select=*&order=created_at.desc${sedeFilterHist}`;
    if(filtro.modo === 'exacta' && filtro.fecha) {
      const desde = toUTC(filtro.fecha, '00:00:00');
      const hasta = toUTC(filtro.fecha, '23:59:59');
      url += `&entrada=gte.${desde}&entrada=lte.${hasta}`;
    } else if(filtro.modo === 'rango') {
      if(filtro.desde) url += `&entrada=gte.${toUTC(filtro.desde,'00:00:00')}`;
      if(filtro.hasta) url += `&entrada=lte.${toUTC(filtro.hasta,'23:59:59')}`;
    }
    const r = await fetch(url, { headers: sbHeaders });
    const data = await r.json();
    if(!r.ok) throw data;
    setOnline(true);
    return Array.isArray(data) ? data : [];
  } catch(e) {
    setOnline(false);
    console.error('fetchHistorial:', e);
    return [];
  }
}

          <div class="cin" id="cn-${p.id}">${p.nombre}</div>
          <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);" id="cp-${p.id}">${Number(p.precio).toLocaleString('es-CO')}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="cat-edit" data-id="${p.id}" style="background:rgba(255,255,255,0.08);border:none;border-radius:6px;color:rgba(255,255,255,0.5);font-size:11px;font-weight:800;cursor:pointer;padding:3px 7px;font-family:var(--font);">Editar</button>
          <button class="cdl" data-id="${p.id}" style="background:none;border:none;color:rgba(252,84,121,0.6);font-size:14px;cursor:pointer;padding:0 4px;font-family:var(--font);font-weight:900;">x</button>
        </div>
      </div>`).join('')}</div>`;

    l.querySelectorAll('.cdl').forEach(b => {
      b.onclick = async () => {
        if(!b.dataset.c) { b.textContent='?'; b.dataset.c='1'; setTimeout(()=>{if(b.dataset.c){b.textContent='x';delete b.dataset.c;}},2000); }
        else { await eliminarProductoCatalogo(parseInt(b.dataset.id)); rL(); }
      };
    });

    l.querySelectorAll('.cat-edit').forEach(b => {
      b.onclick = () => {
        const id = parseInt(b.dataset.id);
        const prod = S.catalogo.find(p => p.id === id);
        if(!prod) return;
        const fila = l.querySelector(`.cit[data-id="${id}"]`);
        fila.innerHTML = `
          <input class="mi" id="edit-n-${id}" value="${prod.nombre}" style="flex:1;min-width:0;font-size:12px;padding:5px 8px"/>
          <input class="mi sm" id="edit-p-${id}" type="number" value="${prod.precio}" style="width:70px;font-size:12px;padding:5px 8px"/>
          <button id="edit-ok-${id}" style="background:var(--teal);color:var(--dark);border:none;border-radius:6px;padding:5px 10px;font-family:var(--font);font-size:11px;font-weight:800;cursor:pointer;">OK</button>
          <button id="edit-cancel-${id}" style="background:rgba(255,255,255,0.08);border:none;border-radius:6px;padding:5px 8px;font-family:var(--font);font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;">x</button>`;
        fila.style.display = 'flex';
        fila.style.gap = '6px';
        fila.style.alignItems = 'center';

        fila.querySelector(`#edit-ok-${id}`).onclick = async () => {
          const nombre = fila.querySelector(`#edit-n-${id}`).value.trim();
          const precio = parseFloat(fila.querySelector(`#edit-p-${id}`).value);
          if(!nombre || isNaN(precio) || precio < 0) return;
          await editarProductoCatalogo(id, nombre, precio);
          rL();
        };
        fila.querySelector(`#edit-cancel-${id}`).onclick = () => rL();
      };
    });
  }

  cargarCatalogo().then(() => rL());

  const add = async () => {
    const n = o.querySelector('#cn').value.trim();
    const p = parseFloat(o.querySelector('#cpr').value);
    if(!n || isNaN(p) || p < 0) return;
    o.querySelector('#ca').textContent = '...';
    await agregarProductoCatalogo(n, p);
    o.querySelector('#cn').value = '';
    o.querySelector('#cpr').value = '';
    o.querySelector('#cn').focus();
    o.querySelector('#ca').textContent = '+';
    rL();
  };

  o.querySelector('#ca').onclick = add;
  o.querySelector('#cn').addEventListener('keydown', e => { if(e.key==='Enter') o.querySelector('#cpr').focus(); });
  o.querySelector('#cpr').addEventListener('keydown', e => { if(e.key==='Enter') add(); });
  o.querySelector('#cx').onclick = () => o.remove();
  o.querySelector('#cc').onclick = () => o.remove();
  o.onclick = e => { if(e.target===o) o.remove(); };
}

// --- CONSUMO ---
function showConsumo(nid) {
  const nino=S.ninos.find(n=>n.id===nid);if(!nino)return;
  const o=mkOv(),tc=S.catalogo.length>0;
  o.innerHTML=`<div class="modal"><div class="mh"><div class="mt">Agregar consumo</div><button class="mx" id="acx">cerrar</button></div>
    <div style="font-size:14px;font-weight:800;color:var(--yellow);margin-bottom:12px">${nino.nombre}</div>
    ${tc?`<div class="mal">Del catalogo</div><div class="ps">${[...S.catalogo].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map((p,i)=>`<button class="pb" data-i="${S.catalogo.indexOf(p)}"><span class="pbn">${p.nombre}</span><span class="pbp">${Number(p.precio).toLocaleString('es-CO')}</span></button>`).join('')}</div><hr class="divider"><div class="mal">Personalizado</div>`:'<div class="mal">Nuevo consumo</div>'}
    <div class="mar"><input class="mi" id="ad" placeholder="Descripcion"/><input class="mi sm" id="ap" type="number" placeholder="Valor" min="0"/><button class="bai" id="aa">+</button></div>
    ${nino.consumos.length>0?`<hr class="divider"><div class="mal">Items agregados</div><div id="al">${nino.consumos.map((c,i)=>`<div class="mcr"><span class="mcn">${c.nombre}</span><span style="display:flex;align-items:center;gap:6px"><span class="mcp">${Number(c.precio).toLocaleString('es-CO')}</span><button class="cdel" data-i="${i}">x</button></span></div>`).join('')}</div>`:''}
    <button class="mbp" id="alo" style="margin-top:14px">Listo</button></div>`;
  document.body.appendChild(o);
  const addI=(nombre,precio)=>{if(!nombre||isNaN(precio)||precio<0)return;nino.consumos.push({nombre,precio});syncConsumos(nid);o.remove();renderCards();showConsumo(nid);};
  if(tc)o.querySelectorAll('.pb').forEach(b=>{b.onclick=()=>{const p=S.catalogo[parseInt(b.dataset.i)];addI(p.nombre,p.precio);};});
  o.querySelector('#aa').onclick=()=>addI(o.querySelector('#ad').value.trim(),parseFloat(o.querySelector('#ap').value));
  o.querySelector('#ad').addEventListener('keydown',e=>{if(e.key==='Enter')o.querySelector('#ap').focus();});
  o.querySelector('#ap').addEventListener('keydown',e=>{if(e.key==='Enter')addI(o.querySelector('#ad').value.trim(),parseFloat(o.querySelector('#ap').value));});
  if(o.querySelector('#al'))o.querySelector('#al').querySelectorAll('.cdel').forEach(b=>{b.onclick=()=>{nino.consumos.splice(parseInt(b.dataset.i),1);syncConsumos(nid);o.remove();renderCards();showConsumo(nid);};});
  o.querySelector('#acx').onclick=()=>{o.remove();renderCards();};
  o.querySelector('#alo').onclick=()=>{o.remove();renderCards();};
  o.onclick=e=>{if(e.target===o){o.remove();renderCards();}};
}

// --- SALIDA ---
function showSalida(nino) {
  let segundosEfectivos = nino.segundos;
  let pJ = cp(segundosEfectivos);
  const tC = nino.consumos.reduce((a,c)=>a+c.precio,0);
  const o = mkOv();
  let descuento = 0;

  o.innerHTML=`<div class="modal"><div class="mh"><div class="mt">Resumen de salida</div><button class="mx" id="sx">cerrar</button></div>
    <div class="mn">${nino.nombre}</div>
    ${nino.nota ? `<div id="s-nota-display" style="font-size:11px;font-weight:700;color:var(--yellow);background:rgba(255,205,0,0.08);border-radius:7px;padding:6px 10px;margin-bottom:8px;">Nota: ${nino.nota}</div>` : '<div id="s-nota-display" style="display:none;"></div>'}
    <div class="mr"><span class="mk">Entrada</span><span class="mv">${fh(nino.entrada)}</span></div>
    <div class="mr"><span class="mk">Salida</span><span class="mv">${fh(Date.now())}</span></div>
    <div class="mr"><span class="mk">Tiempo jugado</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="mv" id="s-tiempo-display">${ft(nino.segundos)}</span>
      <input id="s-tiempo-edit" type="text" inputmode="numeric" placeholder="MM:SS o HH:MM:SS"
        style="display:none;width:100px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 8px;font-family:var(--font);font-size:13px;color:white;outline:none;"/>
      <button id="s-tiempo-btn" style="background:none;border:none;cursor:pointer;padding:2px;opacity:0.5;" title="Editar tiempo">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </div>
    ${nino.consumos.length>0?`<div class="mct">Consumos</div><div id="scl">${nino.consumos.map((c,i)=>`<div class="mcr"><span class="mcn">${c.nombre}</span><span style="display:flex;align-items:center;gap:6px"><span class="mcp">${Number(c.precio).toLocaleString('es-CO')}</span><button class="cdel" data-i="${i}">x</button></span></div>`).join('')}</div>`:'<div id="scl"></div>'}
    <div class="mac"><div class="mal">Agregar consumo de ultimo momento</div>
      ${S.catalogo.length>0?`<div class="ps" style="max-height:110px">${[...S.catalogo].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map((p,i)=>`<button class="pb" data-cat="${S.catalogo.indexOf(p)}"><span class="pbn">${p.nombre}</span><span class="pbp">${Number(p.precio).toLocaleString('es-CO')}</span></button>`).join('')}</div>`:''}
      <div class="mar" style="margin-top:7px"><input class="mi" id="sd" placeholder="Descripcion"/><input class="mi sm" id="sp" type="number" placeholder="Valor" min="0"/><button class="bai" id="sa">+</button></div>
    </div>
    ${nino.nota ? `<div style="background:rgba(255,205,0,0.08);border:1px solid rgba(255,205,0,0.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--yellow);">
      <span style="color:rgba(255,255,255,0.4);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px;">Nota</span>
      ${nino.nota}
    </div>` : ''}
    <div class="mto">
      <div class="mtr"><span class="mtl">Juego libre</span><span class="mtv">${fp(pJ)}</span></div>
      <div class="mtr"><span class="mtl">Consumos</span><span class="mtv" id="stc">${fp(tC)}</span></div>
      <div class="mtr" style="padding-top:8px">
        <span class="mtl" style="color:var(--pink)">Descuento</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:rgba(255,255,255,0.4)">-</span>
          <input id="s-descuento" type="number" min="0" placeholder="0"
            style="width:90px;background:rgba(252,84,121,0.1);border:1.5px solid rgba(252,84,121,0.35);border-radius:7px;padding:5px 8px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--pink);text-align:right;outline:none;"/>
        </div>
      </div>
      <div class="mtr fin">
        <span class="mtl">Total</span>
        <input id="s-total-edit" type="text" inputmode="numeric"
          style="width:130px;background:rgba(255,205,0,0.08);border:1.5px solid rgba(255,205,0,0.3);border-radius:7px;padding:6px 10px;font-family:var(--font);font-size:20px;font-weight:900;color:var(--yellow);text-align:right;outline:none;"/>
      </div>
    </div>
    <div style="margin-top:14px"><div class="mal" style="margin-bottom:8px">Metodo de pago</div>
      <div class="mpago-grid">
        <button class="mpago-btn" data-m="Tarjeta Credito">Tarjeta Credito</button>
        <button class="mpago-btn" data-m="Tarjeta Debito">Tarjeta Debito</button>
        <button class="mpago-btn" data-m="Efectivo">Efectivo</button>
        <button class="mpago-btn" data-m="Llave/Transfer">Llave / Transfer</button>
      </div>
    </div>
    <button class="mbp" id="sconf" disabled style="opacity:0.4;cursor:not-allowed">Confirmar salida</button>
    <button class="mbs" id="scan">Cancelar</button></div>`;
  document.body.appendChild(o);

  const fmtTotal = v => Number(v).toLocaleString('es-CO');
  const parseFmt = s => parseFloat(String(s).replace(/[^0-9]/g,'')) || 0;

  const rT=()=>{
    const tc2=nino.consumos.reduce((a,c)=>a+c.precio,0);
    o.querySelector('#stc').textContent=fp(tc2);
    o.querySelector('#s-total-edit').value=fmtTotal(Math.max(0,pJ+tc2-descuento));
  };
  const syncDesdeDescuento=()=>{
    const tc2=nino.consumos.reduce((a,c)=>a+c.precio,0);
    o.querySelector('#s-total-edit').value=fmtTotal(Math.max(0,pJ+tc2-descuento));
  };
  const syncDesdeTotal=()=>{
    const tc2=nino.consumos.reduce((a,c)=>a+c.precio,0);
    const totalEdit=parseFmt(o.querySelector('#s-total-edit').value);
    descuento=Math.max(0,(pJ+tc2)-totalEdit);
    o.querySelector('#s-descuento').value=descuento>0?descuento:'';
  };

  o.querySelector('#s-descuento').addEventListener('input',e=>{descuento=Math.max(0,parseFloat(e.target.value)||0);syncDesdeDescuento();});
  o.querySelector('#s-total-edit').addEventListener('input',()=>syncDesdeTotal());

  const rCL=()=>{const l=o.querySelector('#scl');if(!l)return;if(nino.consumos.length===0){l.innerHTML='';return;}l.innerHTML=nino.consumos.map((c,i)=>`<div class="mcr"><span class="mcn">${c.nombre}</span><span style="display:flex;align-items:center;gap:6px"><span class="mcp">${Number(c.precio).toLocaleString('es-CO')}</span><button class="cdel" data-i="${i}">x</button></span></div>`).join('');l.querySelectorAll('.cdel').forEach(b=>{b.onclick=()=>{nino.consumos.splice(parseInt(b.dataset.i),1);rCL();rT();};});rT();};
  const addC=(nombre,precio)=>{if(!nombre||isNaN(precio)||precio<0)return;nino.consumos.push({nombre,precio});o.querySelector('#sd').value='';o.querySelector('#sp').value='';const t=o.querySelector('.mct');if(!t){const el=document.createElement('div');el.className='mct';el.textContent='Consumos';o.querySelector('#scl').before(el);}rCL();rT();};

  o.querySelectorAll('[data-cat]').forEach(b=>{b.onclick=()=>{const p=S.catalogo[parseInt(b.dataset.cat)];addC(p.nombre,p.precio);};});
  o.querySelector('#sa').onclick=()=>addC(o.querySelector('#sd').value.trim(),parseFloat(o.querySelector('#sp').value));
  o.querySelector('#sd').addEventListener('keydown',e=>{if(e.key==='Enter')o.querySelector('#sp').focus();});
  o.querySelector('#sp').addEventListener('keydown',e=>{if(e.key==='Enter')addC(o.querySelector('#sd').value.trim(),parseFloat(o.querySelector('#sp').value));});
  o.querySelector('#scl').querySelectorAll('.cdel').forEach(b=>{b.onclick=()=>{nino.consumos.splice(parseInt(b.dataset.i),1);rCL();rT();};});

  let metodoPago='';
  o.querySelectorAll('.mpago-btn').forEach(b=>{
    b.onclick=()=>{
      o.querySelectorAll('.mpago-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');metodoPago=b.dataset.m;
      const bc=o.querySelector('#sconf');bc.disabled=false;bc.style.opacity='1';bc.style.cursor='pointer';
    };
  });

  rT();

  o.querySelector('#sconf').onclick=async()=>{
    const totalFinal=parseFmt(o.querySelector('#s-total-edit').value);
    const tc2=nino.consumos.reduce((a,c)=>a+c.precio,0);
    const descFinal=Math.max(0,(pJ+tc2)-totalFinal);
    o.querySelector('#sconf').disabled=true;
    o.querySelector('#sconf').textContent='Guardando...';
    try {
      await confirmarSalida(nino,totalFinal,descFinal,metodoPago,segundosEfectivos);
      o.remove();
      toast('Salida registrada');
    } catch(e) {
      o.querySelector('#sconf').disabled=false;
      o.querySelector('#sconf').textContent='Confirmar salida';
    }
  };
  // Logica editar tiempo
  const btnTiempoEdit = o.querySelector('#s-tiempo-btn');
  const inputTiempo = o.querySelector('#s-tiempo-edit');
  const displayTiempo = o.querySelector('#s-tiempo-display');

  btnTiempoEdit.onclick = () => {
    inputTiempo.style.display = 'block';
    displayTiempo.style.display = 'none';
    inputTiempo.value = ft(segundosEfectivos);
    inputTiempo.focus();
    inputTiempo.select();
  };

  function parseTiempoInput(val) {
    const parts = val.trim().split(':').map(Number);
    if(parts.some(isNaN)) return null;
    if(parts.length === 2) return parts[0]*60 + parts[1];
    if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    return null;
  }

  function aplicarTiempoEditado() {
    const seg = parseTiempoInput(inputTiempo.value);
    if(seg === null || seg < 0) { toast('Formato invalido. Usa MM:SS o HH:MM:SS'); return; }
    segundosEfectivos = seg;
    pJ = cp(segundosEfectivos);
    displayTiempo.textContent = ft(segundosEfectivos);
    inputTiempo.style.display = 'none';
    displayTiempo.style.display = '';
    descuento = 0;
    o.querySelector('#s-descuento').value = '';
    rT();
  }

  inputTiempo.addEventListener('blur', aplicarTiempoEditado);
  inputTiempo.addEventListener('keydown', e => { if(e.key === 'Enter') aplicarTiempoEditado(); });

  o.querySelector('#sx').onclick=()=>o.remove();
  o.querySelector('#scan').onclick=()=>o.remove();
  o.onclick=e=>{if(e.target===o)o.remove();};
}

// --- HISTORIAL ---
function showHistorial() {
  const o = mkOv();
  let modo='todo', fechaExacta='', fechaDesde='', fechaHasta='';
  let datosActuales=[];

  o.innerHTML=`<div class="modal wide">
    <div class="mh"><div class="mt">Historial</div><button class="mx" id="hx">cerrar</button></div>
    <div class="hfiltros" style="align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
      <button class="hfbtn activo" data-m="todo">Todo</button>
      <button class="hfbtn" data-m="exacta">Fecha exacta</button>
      <button class="hfbtn" data-m="rango">Rango de fechas</button>
      <div id="w-exacta" style="display:none;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);">
        <span>Fecha</span><input class="hdate" type="date" id="h-fecha-exacta"/>
      </div>
      <div id="w-rango" style="display:none;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);">
        <span>Desde</span><input class="hdate" type="date" id="h-desde"/>
        <span>hasta</span><input class="hdate" type="date" id="h-hasta"/>
      </div>
      <button class="tbtn" id="h-buscar" style="height:30px;padding:0 14px;font-size:11px;">Buscar</button>
      <button class="tbtn" id="hcsv" style="height:30px;padding:0 14px;font-size:11px;">Descargar CSV</button>
    </div>
    <div class="hres">
      <div class="hs"><div class="hsl">Registros</div><div class="hsv" id="h-stat-n">—</div></div>
      <div class="hs"><div class="hsl">Juego libre</div><div class="hsv" id="h-stat-j">—</div></div>
      <div class="hs"><div class="hsl">Consumos</div><div class="hsv" id="h-stat-c" style="color:var(--teal)">—</div></div>
      <div class="hs"><div class="hsl">Descuentos</div><div class="hsv" id="h-stat-d" style="color:var(--pink)">—</div></div>
      <div class="hs"><div class="hsl">Total</div><div class="hsv" id="h-stat-t" style="color:white">—</div></div>
      <div class="hs"><div class="hsl">Tkt Promedio</div><div class="hsv" id="h-stat-avg" style="color:var(--yellow)">—</div></div>
    </div>
    <div class="htw"><table class="ht">
      <thead><tr>
        <th style="width:9%">Fecha</th>
        <th style="width:13%">Nombre</th>
        <th style="width:10%">Entrada</th>
        <th style="width:8%">Tiempo</th>
        <th style="width:10%">Juego</th>
        <th style="width:22%">Consumos</th>
        <th style="width:9%">Descuento</th>
        <th style="width:10%">Total</th>
        <th style="width:10%">Pago</th>
        <th style="width:10%">Nota</th>
        <th style="width:4%"></th>
      </tr></thead>
      <tbody id="h-tbody"><tr><td colspan="11" class="he2">Presiona Buscar para cargar registros</td></tr></tbody>
    </table></div>
    <button class="mbd2" id="h-elim" style="display:none;margin-top:10px;">Eliminar registros filtrados</button>
  </div>`;

  document.body.appendChild(o);

  function fmtFecha(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('es-CO', {day:'2-digit',month:'2-digit',year:'2-digit'});
  }

  async function render() {
    o.querySelector('#h-tbody').innerHTML='<tr><td colspan="11" class="he2">Cargando...</td></tr>';
    const h = await fetchHistorial({modo, fecha:fechaExacta, desde:fechaDesde, hasta:fechaHasta});
    datosActuales = h;

    const tJ=h.reduce((a,r)=>a+r.precio_juego,0);
    const tC=h.reduce((a,r)=>a+r.total_consumos,0);
    const tD=h.reduce((a,r)=>a+(r.descuento||0),0);
    const tG=h.reduce((a,r)=>a+r.total_final,0);

    const avg = h.length > 0 ? Math.round(tG / h.length) : 0;
    o.querySelector('#h-stat-n').textContent = h.length;
    o.querySelector('#h-stat-j').textContent = fp(tJ);
    o.querySelector('#h-stat-c').textContent = fp(tC);
    o.querySelector('#h-stat-d').textContent = fp(tD);
    o.querySelector('#h-stat-t').textContent = fp(tG);
    o.querySelector('#h-stat-avg').textContent = h.length > 0 ? fp(avg) : '—';

    const tbody = o.querySelector('#h-tbody');
    tbody.innerHTML = h.length===0
      ? `<tr><td colspan="11" class="he2">Sin registros para este filtro</td></tr>`
      : h.map(r=>`<tr>

  };

  o.querySelector('#hx').onclick=()=>o.remove();

  // CSV siempre descarga lo que este en datosActuales en ese momento
  o.querySelector('#hcsv').addEventListener('click', () => {

function dlCSV(regs) {
  if(!regs || !regs.length) { toast('No hay datos para descargar'); return; }
  const bom = '\uFEFF';
  const enc = ['Fecha','Nombre','Hora Entrada','Hora Salida','Tiempo Jugado','Precio Juego','Descripcion Consumos','Subtotal Consumos','Descuento','Total','Metodo de Pago','Nota'];
  const rows = regs.map(r => {
    const d = r.consumos && r.consumos.length > 0 ? r.consumos.map(c => c.nombre + ' (' + Number(c.precio).toLocaleString('es-CO') + ')').join(' / ') : '';
    const fmtFechaCSV = ts => new Date(ts).toLocaleDateString('es-CO',{year:'numeric',month:'2-digit',day:'2-digit'});
    const fmtHoraCSV = ts => new Date(ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    return [
      fmtFechaCSV(new Date(r.entrada)),
      r.nombre,
      fmtHoraCSV(new Date(r.entrada)),
      fmtHoraCSV(new Date(r.salida)),
      ft(r.duracion_segundos),
      r.precio_juego,
      d,
      r.total_consumos || 0,
      r.descuento || 0,
      r.total_final,
      r.metodo_pago || '',
      r.nota || ''
    ];
  });
  const csv = bom + [enc, ...rows].map(f => f.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gorio_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

let tiempoSeleccionado = 0;





let syncCounter = 0;












function tick() {
  S.ninos.forEach(nino=>{
    if(!nino.pausado && nino.entrada) {
      // Siempre calcular desde hora de entrada real - nunca depender del contador local
      nino.segundos = Math.max(0, Math.floor((Date.now() - nino.entrada) / 1000));
    } else if(isNaN(nino.segundos)) {
      nino.segundos = 0;
    }
    const card=document.querySelector(`.card[data-id="${nino.id}"]`);if(!card)return;
    const enA = enAlerta(nino);
    card.className='card'+(enA?' alerta':'');
    card.dataset.id=nino.id;
    const tEl=card.querySelector(`#t-${nino.id}`);if(tEl)tEl.textContent=ft(nino.segundos);
    const barra=card.querySelector(`#barra-${nino.id}`);
    if(barra && nino.tiempoLimite > 0){
      const pct=Math.min(100,Math.round((nino.segundos/(nino.tiempoLimite*60))*100));
      barra.style.width=pct+'%';
      barra.style.background=pct>=100?'var(--orange)':pct>=80?'#FFCD00':'#4ade80';
      const tlabel=card.querySelector(`#tlabel-${nino.id}`);
      if(tlabel)tlabel.textContent=pct>=100?'Tiempo cumplido':`${nino.tiempoLimite} min contratados`;
    }
    const bA=card.querySelector('.badge-alerta'),bP=card.querySelector('.badge-pausado');
    if(nino.pausado){if(bA)bA.remove();if(!bP){const b=document.createElement('div');b.className='badge badge-pausado';b.textContent='PAUSADO';card.appendChild(b);}}
    else if(enA){if(bP)bP.remove();if(!bA){const b=document.createElement('div');b.className='badge badge-alerta';b.textContent='ALERTA';card.appendChild(b);}}
    else{if(bA)bA.remove();if(bP)bP.remove();}
    const bp=card.querySelector('.cbtn-pausar');
    if(bp){bp.textContent=nino.pausado?'Reanudar':'Pausar';bp.className='cbtn cbtn-pausar'+(nino.pausado?' pausado':'');}
  });
  updateStats();
  syncCounter++;
  if(syncCounter>=10){syncSegundos();syncCounter=0;}
}

const SESSION_KEY = 'gorio_session';

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function setSession(usuario, rol, sedeId=null, sedeNombre=null) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({usuario, rol, sedeId, sedeNombre}));
}
function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

function aplicarPermisos(rol, sedeNombre) {
  // Mostrar sede en header
  const headerSub = document.querySelector('.header-left');
  if(headerSub && sedeNombre) {
    const sedeEl = document.createElement('div');
    sedeEl.style.cssText = 'font-size:11px;font-weight:700;color:var(--purple-light);margin-left:8px;';
    sedeEl.textContent = sedeNombre;
    sedeEl.id = 'sede-label';
    headerSub.appendChild(sedeEl);
  }
  // Recepcion: no puede eliminar registros ni editar tarifas
  if(rol === 'recepcion') {
    const btnTarifas = $('btn-tarifas');
    if(btnTarifas) btnTarifas.style.display = 'none';
  }
}

async function intentarLogin() {
  const usuario = $('login-usuario').value.trim();
  const clave = $('login-clave').value;
  const errorEl = $('login-error');
  const btn = $('login-btn');

  if(!usuario || !clave) { errorEl.textContent = 'Ingresa usuario y contrasena'; return; }

  btn.textContent = 'Verificando...';
  btn.disabled = true;
  errorEl.textContent = '';

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&clave=eq.${encodeURIComponent(clave)}&select=usuario,rol,sede_id`, {
      headers: sbHeaders
    });
    const data = await r.json();
    if(!r.ok || !Array.isArray(data) || data.length === 0) {
      errorEl.textContent = 'Usuario o contrasena incorrectos';
      btn.textContent = 'Ingresar';
      btn.disabled = false;
      return;
    }
    const {rol, sede_id} = data[0];

    // Si tiene sede, cargar nombre de la sede
    let sedeNombre = null;
    let sedeId = sede_id || null;
    if(sede_id) {
      const rs = await fetch(`${SUPABASE_URL}/rest/v1/sedes?id=eq.${sede_id}&select=nombre,codigo`, {headers: sbHeaders});
      const sedes = await rs.json();
      if(Array.isArray(sedes) && sedes.length > 0) sedeNombre = sedes[0].nombre;
    }

    setSession(usuario, rol, sedeId, sedeNombre);
    $('login-screen').style.display = 'none';
    $('app').style.display = 'block';
    aplicarPermisos(rol, sedeNombre);
    agregarBotonSalir();

    // Admin sin sede: mostrar selector de sede primero
    if(rol === 'admin' && !sedeId) {
      await seleccionarSede();
    } else {
      iniciarApp();
    }
  } catch(e) {
    errorEl.textContent = 'Error de conexion. Intenta de nuevo.';
    btn.textContent = 'Ingresar';
    btn.disabled = false;
  }
}

async function seleccionarSede() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/sedes?activa=eq.true&select=id,nombre,codigo&order=codigo.asc`, {headers: sbHeaders});
  const sedes = await r.json();
  if(!Array.isArray(sedes) || sedes.length === 0) { iniciarApp(); return; }

  const o = document.createElement('div');
  o.className = 'overlay';
  o.style.zIndex = '9500';
  o.innerHTML = `<div class="modal">
    <div class="mh"><div class="mt">Seleccionar sede</div></div>
    <div style="margin-bottom:14px;font-size:13px;color:rgba(255,255,255,0.5);font-weight:600;">Como administrador puedes ver cualquier sede o todas a la vez.</div>
    <div style="display:flex;flex-direction:column;gap:8px;" id="sede-lista">
      ${sedes.map(s => `<button class="sede-btn tbtn" data-id="${s.id}" data-nombre="${s.nombre}" style="height:44px;font-size:14px;font-weight:800;justify-content:flex-start;padding:0 16px;">${s.nombre}</button>`).join('')}
      <button class="sede-btn tbtn" data-id="todas" data-nombre="Todas las sedes" style="height:44px;font-size:14px;font-weight:800;justify-content:flex-start;padding:0 16px;border-color:var(--yellow);color:var(--yellow);">Todas las sedes</button>
    </div>
  </div>`;
  document.body.appendChild(o);

  o.querySelectorAll('.sede-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id === 'todas' ? null : parseInt(btn.dataset.id);
      const nombre = btn.dataset.nombre;
      const sesion = getSession();
      setSession(sesion.usuario, sesion.rol, id, nombre);
      o.remove();
      aplicarPermisos(sesion.rol, nombre);
      iniciarApp();
    };
  });
}

function iniciarApp() {
  initTselBtns();
  tickHora();
  cargarTarifas();
  cargarNinos();
  cargarCatalogo();
  actualizarContadorHoy();
}

// Agregar boton de cerrar sesion al header
function agregarBotonSalir() {
  const headerRight = document.querySelector('.header-right');
  if(!headerRight) return;
  const btn = document.createElement('button');
  btn.style.cssText = 'background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-family:var(--font);font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;';
  btn.textContent = 'Salir';
  btn.onclick = () => {
    clearSession();
    location.reload();
  };
  headerRight.appendChild(btn);
}

// ── INICIO ───────────────────────────────────────────────
// Verificar sesion existente o mostrar login
const sesionActual = getSession();
if(sesionActual) {
  $('login-screen').style.display = 'none';
  $('app').style.display = 'block';
  aplicarPermisos(sesionActual.rol, sesionActual.sedeNombre);
  agregarBotonSalir();
  if(sesionActual.rol === 'admin' && !sesionActual.sedeId) {
    seleccionarSede();
  } else {
    iniciarApp();
  }
} else {
  $('login-btn').addEventListener('click', intentarLogin);
  $('login-clave').addEventListener('keydown', e => { if(e.key === 'Enter') intentarLogin(); });
  $('login-usuario').addEventListener('keydown', e => { if(e.key === 'Enter') $('login-clave').focus(); });
}
