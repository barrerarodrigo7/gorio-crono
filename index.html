  const transcurrido = Math.floor((ahora - entradaMs) / 1000);

async function syncSegundos() {

  } catch(e) { setOnline(false); }
}

// --- CONFIRMAR SALIDA ---
async function confirmarSalida(nino, totalFinal, descuento, metodoPago) {
  const salida = new Date().toISOString();
  const pF = cp(nino.segundos);
  const tC = nino.consumos.reduce((a,c)=>a+c.precio,0);
  try {
    const {error: eIns} = await sb.from('historial').insert({
      nombre: nino.nombre,
      entrada: fiso(nino.entrada),
      salida,
      duracion_segundos: nino.segundos,
      precio_juego: pF,
      consumos: nino.consumos,
      total_consumos: tC,
      descuento,
      total_final: totalFinal,
      metodo_pago: metodoPago
    });
    if(eIns) throw eIns;
    const {error: eDel} = await sb.from('ninos_activos').delete().eq('id',nino.id);
    if(eDel) throw eDel;
    S.ninos = S.ninos.filter(n=>n.id!==nino.id);
    setOnline(true);
    renderCards(); updateStats();
  } catch(e) {
    setOnline(false);
    toast('Error al registrar salida. Intenta de nuevo.');
    console.error('confirmarSalida:', e);
    throw e;
  }
}

// --- HISTORIAL DESDE SUPABASE ---
async function fetchHistorial(filtro) {
  try {
    let q = sb.from('historial').select('*').order('created_at',{ascending:false});
    if(filtro.modo === 'exacta' && filtro.fecha) {
      const desde = filtro.fecha + 'T00:00:00';
      const hasta = filtro.fecha + 'T23:59:59';
      q = q.gte('entrada', desde).lte('entrada', hasta);
    } else if(filtro.modo === 'rango') {
      if(filtro.desde) q = q.gte('entrada', filtro.desde + 'T00:00:00');
      if(filtro.hasta) q = q.lte('entrada', filtro.hasta + 'T23:59:59');
    }
    const {data,error} = await q;
    if(error) throw error;
    setOnline(true);
    return data || [];
  } catch(e) {
    setOnline(false);
    console.error('fetchHistorial:', e);
    return [];
  }
}

async function eliminarRegistroHistorial(id) {

    if(error) throw error;
    setOnline(true);
    return true;
  } catch(e) {
    setOnline(false);
    return false;
  }
}

      <button class="hfbtn activo" data-m="todo">Todo</button>
      <button class="hfbtn" data-m="exacta">Fecha exacta</button>
      <button class="hfbtn" data-m="rango">Rango de fechas</button>
      <div id="w-exacta" style="display:none;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);">
        <span>Fecha</span><input class="hdate" type="date" id="h-fecha-exacta"/>
      </div>
      <div id="w-rango" style="display:none;align-items:center;gap:6px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);">
        <span>Desde</span><input class="hdate" type="date" id="h-desde"/>
        <span>hasta</span><input class="hdate" type="date" id="h-hasta"/>
      </div>
    </div>
    <div class="hres">
      <div class="hs"><div class="hsl">Registros</div><div class="hsv" id="h-stat-n">—</div></div>
      <div class="hs"><div class="hsl">Juego libre</div><div class="hsv" id="h-stat-j">—</div></div>
      <div class="hs"><div class="hsl">Consumos</div><div class="hsv" id="h-stat-c" style="color:var(--teal)">—</div></div>
      <div class="hs"><div class="hsl">Descuentos</div><div class="hsv" id="h-stat-d" style="color:var(--pink)">—</div></div>
      <div class="hs"><div class="hsl">Total</div><div class="hsv" id="h-stat-t" style="color:white">—</div></div>
    </div>
    <div class="htw"><table class="ht">
      <thead><tr>
        <th style="width:8%">Fecha</th>
        <th style="width:12%">Nombre</th>
        <th style="width:12%">Horario</th>
        <th style="width:7%">Tiempo</th>
        <th style="width:9%">Juego</th>
        <th style="width:20%">Consumos</th>
        <th style="width:8%">Descuento</th>
        <th style="width:9%">Total</th>
        <th style="width:11%">Pago</th>
        <th style="width:4%"></th>
      </tr></thead>
      <tbody id="h-tbody"><tr><td colspan="10" class="he2">Cargando...</td></tr></tbody>
    </table></div>
    <button class="mbp" id="hcsv" style="margin-top:12px">Descargar CSV</button>
    <button class="mbd2" id="h-elim" style="display:none">Eliminar registros filtrados</button>
    <button class="mbs" id="hc">Cerrar</button>
  </div>`;
  document.body.appendChild(o);

  async function render() {
    o.querySelector('#h-tbody').innerHTML='<tr><td colspan="10" class="he2">Cargando...</td></tr>';
    const h = await fetchHistorial({modo,fecha:fechaExacta,desde:fechaDesde,hasta:fechaHasta});
    datosActuales = h;

    const tJ=h.reduce((a,r)=>a+r.precio_juego,0);
    const tC=h.reduce((a,r)=>a+r.total_consumos,0);
    const tD=h.reduce((a,r)=>a+(r.descuento||0),0);
    const tG=h.reduce((a,r)=>a+r.total_final,0);

    o.querySelector('#h-stat-n').textContent=h.length;
    o.querySelector('#h-stat-j').textContent=fp(tJ);
    o.querySelector('#h-stat-c').textContent=fp(tC);
    o.querySelector('#h-stat-d').textContent=fp(tD);
    o.querySelector('#h-stat-t').textContent=fp(tG);

    const tbody=o.querySelector('#h-tbody');
    tbody.innerHTML=h.length===0
      ?`<tr><td colspan="10" class="he2">Sin registros para este filtro</td></tr>`
      :h.map(r=>`<tr>
          <td>${ff(new Date(r.entrada))}</td>
          <td style="font-weight:800;color:white">${r.nombre}</td>
          <td>${fh(new Date(r.entrada))} – ${fh(new Date(r.salida))}</td>
          <td>${ft(r.duracion_segundos)}</td>
          <td class="am">${fp(r.precio_juego)}</td>
          <td class="te">${r.consumos&&r.consumos.length>0?r.consumos.map(c=>c.nombre+' '+fp(c.precio)).join(' / '):'—'}</td>
          <td style="color:var(--pink);font-size:11px;font-weight:700">${r.descuento>0?'-'+fp(r.descuento):'—'}</td>
          <td class="am" style="color:white">${fp(r.total_final)}</td>
          <td style="color:rgba(255,255,255,0.6);font-size:11px">${r.metodo_pago||'—'}</td>
          <td class="hdel-row"><button class="hdel-btn" data-id="${r.id}">x</button></td>
        </tr>`).join('');

    tbody.querySelectorAll('.hdel-btn').forEach(b=>{
      b.onclick=async()=>{
        if(!b.dataset.c){b.textContent='?';b.dataset.c='1';setTimeout(()=>{if(b.dataset.c){b.textContent='x';delete b.dataset.c;}},2000);}
        else{const ok=await eliminarRegistroHistorial(parseInt(b.dataset.id));if(ok)render();}
      };
    });

    const btnElim=o.querySelector('#h-elim');
    btnElim.style.display=h.length>0?'block':'none';
    btnElim.textContent=`Eliminar ${h.length} registro${h.length!==1?'s':''} filtrados`;

    ['.hfbtn[data-m="todo"]','.hfbtn[data-m="exacta"]','.hfbtn[data-m="rango"]'].forEach(sel=>{
      const b=o.querySelector(sel);if(b)b.className='hfbtn'+(b.dataset.m===modo?' activo':'');
    });
    const wE=o.querySelector('#w-exacta'),wR=o.querySelector('#w-rango');
    if(wE)wE.style.display=modo==='exacta'?'flex':'none';
    if(wR)wR.style.display=modo==='rango'?'flex':'none';

    o.querySelector('#hcsv').onclick=()=>dlCSV(h);
  }

  o.querySelectorAll('.hfbtn').forEach(b=>{b.onclick=()=>{modo=b.dataset.m;render();};});
  o.querySelector('#h-fecha-exacta').addEventListener('input',e=>{fechaExacta=e.target.value;render();});
  o.querySelector('#h-desde').addEventListener('input',e=>{fechaDesde=e.target.value;render();});
  o.querySelector('#h-hasta').addEventListener('input',e=>{fechaHasta=e.target.value;render();});

  o.querySelector('#h-elim').onclick=async()=>{
    const btn=o.querySelector('#h-elim');
    if(!btn.dataset.c){btn.textContent='Confirmar eliminacion — presiona de nuevo';btn.dataset.c='1';setTimeout(()=>{if(btn.dataset.c){delete btn.dataset.c;render();}},3000);}
    else{
      await Promise.all(datosActuales.map(r=>eliminarRegistroHistorial(r.id)));
      delete btn.dataset.c;render();
    }
  };

  o.querySelector('#hx').onclick=()=>o.remove();
  o.querySelector('#hc').onclick=()=>o.remove();
  o.onclick=e=>{if(e.target===o)o.remove();};
  render();
}

// --- CSV ---
function dlCSV(regs) {
  if(!regs.length)return;
  const bom='\uFEFF';
  const enc=['Fecha','Nombre','Hora Entrada','Hora Salida','Tiempo Jugado','Precio Juego COP','Descripcion Consumos','Subtotal Consumos COP','Descuento COP','Total COP','Metodo de Pago'];
  const rows=regs.map(r=>{
    const d=r.consumos&&r.consumos.length>0?r.consumos.map(c=>c.nombre+' ('+fp(c.precio)+')').join(' / '):'';
    return[ff(new Date(r.entrada)),r.nombre,fh(new Date(r.entrada)),fh(new Date(r.salida)),ft(r.duracion_segundos),r.precio_juego,d,r.total_consumos,r.descuento||0,r.total_final,r.metodo_pago||''];
  });
  const csv=bom+[enc,...rows].map(f=>f.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  const a=document.createElement('a');a.href=url;a.download=`gorio_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

// --- RENDER CARDS ---
function renderCards() {
  const area=$('cards-area');
  const ids=new Set(S.ninos.map(n=>n.id));
  area.querySelectorAll('.card').forEach(c=>{if(!ids.has(parseInt(c.dataset.id)))c.remove();});
  const exist=new Set([...area.querySelectorAll('.card')].map(c=>parseInt(c.dataset.id)));
  if(S.ninos.length===0&&!area.querySelector('.empty-state')){
    area.innerHTML='<div class="empty-state"><div class="empty-icon">+</div><div class="empty-text">Registra la entrada de un nino para comenzar</div></div>';return;
  }
  if(S.ninos.length>0){const es=area.querySelector('.empty-state');if(es)es.remove();}
  S.ninos.forEach(nino=>{
    if(!exist.has(nino.id)){
      const c=document.createElement('div');c.className='card';c.dataset.id=nino.id;
      c.innerHTML=buildCard(nino);area.appendChild(c);
      c.querySelector('.cbtn-pausar').addEventListener('click',()=>togglePausa(nino.id));
      c.querySelector('.cbtn-salida').addEventListener('click',()=>showSalida(nino));
      c.querySelector('.cbtn-consumo').addEventListener('click',()=>showConsumo(nino.id));
    }
  });
}

function buildCard(nino) {
  const enA=S.alertaActiva&&!nino.pausado&&nino.segundos>=S.alertaMin*60;
  const badge=nino.pausado?'<div class="badge badge-pausado">PAUSADO</div>':enA?'<div class="badge badge-alerta">ALERTA</div>':'';
  const chips=nino.consumos.length>0?`<div class="card-chips">${nino.consumos.map(c=>`<span class="chip">${c.nombre}</span>`).join('')}</div>`:'<div class="card-chips"></div>';
  return `${badge}
    <div class="card-left">
      <div class="card-num">#${ph(nino.numero)}</div>
      <div class="card-tiempo" id="t-${nino.id}">${ft(nino.segundos)}</div>
      <div class="card-desde">desde <span>${fh(nino.entrada)}</span></div>
    </div>
    <div class="card-right">
      <div class="card-nombre">${nino.nombre}</div>
      ${chips}
      <div class="card-actions">
        <button class="cbtn cbtn-pausar ${nino.pausado?'pausado':''}">${nino.pausado?'Reanudar':'Pausar'}</button>
        <button class="cbtn cbtn-consumo">+ Consumo</button>
        <button class="cbtn cbtn-salida">Salida</button>
      </div>
    </div>`;
}

let syncCounter = 0;
function tick() {
  S.ninos.forEach(nino=>{
    if(!nino.pausado) nino.segundos++;
    const card=document.querySelector(`.card[data-id="${nino.id}"]`);if(!card)return;
    const enA=S.alertaActiva&&!nino.pausado&&nino.segundos>=S.alertaMin*60;
    card.className='card'+(enA?' alerta':'');card.dataset.id=nino.id;
    const tEl=card.querySelector(`#t-${nino.id}`);if(tEl)tEl.textContent=ft(nino.segundos);
    const bA=card.querySelector('.badge-alerta'),bP=card.querySelector('.badge-pausado');
    if(nino.pausado){if(bA)bA.remove();if(!bP){const b=document.createElement('div');b.className='badge badge-pausado';b.textContent='PAUSADO';card.appendChild(b);}}
    else if(enA){if(bP)bP.remove();if(!bA){const b=document.createElement('div');b.className='badge badge-alerta';b.textContent='ALERTA';card.appendChild(b);}}
    else{if(bA)bA.remove();if(bP)bP.remove();}
    const bp=card.querySelector('.cbtn-pausar');if(bp){bp.textContent=nino.pausado?'Reanudar':'Pausar';bp.className='cbtn cbtn-pausar'+(nino.pausado?' pausado':'');}
  });
  updateStats();
  syncCounter++;
  if(syncCounter >= 10){ syncSegundos(); syncCounter=0; }
}

function updateStats() {
  const t=S.ninos.length,al=S.ninos.filter(n=>S.alertaActiva&&!n.pausado&&n.segundos>=S.alertaMin*60).length;
  $('count-activos').textContent=t;$('count-alerta').textContent=al;
}

$('btn-agregar').addEventListener('click',()=>{const v=$('input-nombre').value.trim();if(!v)return;addNino(v);$('input-nombre').value='';$('input-nombre').focus();});
$('input-nombre').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-agregar').click();});
$('btn-alerta').addEventListener('click',showAlerta);
$('btn-historial').addEventListener('click',showHistorial);
$('btn-catalogo').addEventListener('click',showCatalogo);

// Recargar ninos cada 30s (por si otra sesion agrega/elimina)
setInterval(cargarNinos, 30000);
setInterval(tick, 1000);
setInterval(tickHora, 1000);
tickHora();
cargarNinos();
</script>
